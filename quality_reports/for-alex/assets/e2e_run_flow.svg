<text x="560" y="510" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="500" fill="#22513a"><tspan x="560" dy="0">output/audit/{slug}/runs</tspan><tspan x="560" dy="17">preserves the full trail</tspan></text>
<text x="490" y="600" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="500" fill="#172033"><tspan x="490" dy="0">The export step reads trusted graph snapshots only; it does not call the model again.</tspan></text>
