<text x="110" y="229" text-anchor="start" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e4677"><tspan x="110" dy="0">Stable runs</tspan></text>
