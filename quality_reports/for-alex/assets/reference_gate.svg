<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="660" viewBox="0 0 980 660" role="img" aria-labelledby="reference-verification-gate">
  <title id="reference-verification-gate">Reference Verification Gate</title>

  <defs>
