<text x="170" y="540" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="500" fill="#792d28"><tspan x="170" dy="0">Blocked</tspan><tspan x="170" dy="17">reference gate closed</tspan></text>
<text x="490" y="620" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="500" fill="#172033" font-style="italic"><tspan x="490" dy="0">Verification is metadata, not a run status; it requires filing-grounded review.</tspan></text>
