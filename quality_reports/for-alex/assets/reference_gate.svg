<text x="110" y="364" text-anchor="start" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="14" font-weight="700" fill="#22513a"><tspan x="110" dy="0">Verification</tspan></text>
<text x="170" y="389" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="400" fill="#172033"><tspan x="170" dy="0">report exists</tspan><tspan x="170" dy="18">current run cited</tspan><tspan x="170" dy="18">Conclusion: VERIFIED</tspan></text>
