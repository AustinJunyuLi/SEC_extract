<text x="182" y="483" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="11" font-weight="500" fill="#bf6258"><tspan x="182" dy="0">no</tspan></text>
