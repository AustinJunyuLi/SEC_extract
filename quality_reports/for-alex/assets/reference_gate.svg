<text x="490" y="389" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="400" fill="#172033"><tspan x="490" dy="0">target proof accepted</tspan><tspan x="490" dy="18">--release-targets set</tspan></text>
