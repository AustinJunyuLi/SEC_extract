<text x="160" y="139" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="400" fill="#172033"><tspan x="160" dy="0">example: bid claim</tspan><tspan x="160" dy="18">Party C</tspan><tspan x="160" dy="18">$21.00</tspan></text>
