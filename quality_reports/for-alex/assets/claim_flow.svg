<text x="660" y="359" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="400" fill="#172033"><tspan x="660" dy="0">rejected_unsupported</tspan><tspan x="660" dy="18">no graph entry</tspan></text>
<path d="M 760 360 L 796 360" fill="none" stroke="#bd7a2b" stroke-width="1.65" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
<rect x="800" y="300" width="200" height="120" rx="12" fill="#fff7e8" stroke="#bd7a2b" stroke-width="1.35" filter="url(#softShadow)"/>
<text x="900" y="334" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="14" font-weight="700" fill="#744412"><tspan x="900" dy="0">Review stream</tspan></text>
<text x="900" y="359" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="400" fill="#172033"><tspan x="900" dy="0">JSONL issue row</tspan><tspan x="900" dy="18">candidate units</tspan></text>
<text x="530" y="470" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="500" fill="#172033" font-style="italic"><tspan x="530" dy="0">Only the upper path creates canonical graph rows; the lower path remains review-only.</tspan></text>
</svg>
