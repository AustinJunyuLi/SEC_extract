<text x="410" y="359" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="400" fill="#172033"><tspan x="410" dy="0">unknown unit</tspan><tspan x="410" dy="18">missing quote</tspan><tspan x="410" dy="18">ambiguous quote</tspan></text>
