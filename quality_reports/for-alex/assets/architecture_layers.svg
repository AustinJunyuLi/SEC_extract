<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="440" viewBox="0 0 1040 440" role="img" aria-labelledby="three-layer-extraction-architecture">
  <title id="three-layer-extraction-architecture">Three-Layer Extraction Architecture</title>

  <defs>
    <filter id="softShadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#172033" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowSlate" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 2 L 11 6 L 1 10 z" fill="#8390a3"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 2 L 11 6 L 1 10 z" fill="#4f956f"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 2 L 11 6 L 1 10 z" fill="#bf6258"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1 2 L 11 6 L 1 10 z" fill="#bd7a2b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1040" height="440" fill="#ffffff"/>
<rect x="30" y="175" width="140" height="90" rx="12" fill="#f6f8fb" stroke="#8390a3" stroke-width="1.2"/>
<text x="100" y="207" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="12" font-weight="500" fill="#354255"><tspan x="100" dy="0">SEC filing</tspan><tspan x="100" dy="17">Background pages</tspan><tspan x="100" dy="17">pages.json</tspan></text>
<path d="M 170 220 L 210 220" fill="none" stroke="#8390a3" stroke-width="1.65" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
<rect x="210" y="100" width="240" height="240" rx="12" fill="#fff7e8" stroke="#bd7a2b" stroke-width="1.35" filter="url(#softShadow)"/>
<circle cx="234" cy="129" r="12" fill="#ffffff" stroke="#bd7a2b" stroke-width="1.15"/>
<text x="234" y="134" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="700" fill="#bd7a2b"><tspan x="234" dy="0">1</tspan></text>
<text x="260" y="134" text-anchor="start" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="15" font-weight="700" fill="#744412"><tspan x="260" dy="0">Layer 1: LLM</tspan></text>
<text x="330" y="161" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="400" fill="#172033"><tspan x="330" dy="0">Proposes source-backed</tspan><tspan x="330" dy="20">claims only</tspan><tspan x="330" dy="20"></tspan><tspan x="330" dy="20">5 claim families</tspan><tspan x="330" dy="20">exact evidence refs</tspan><tspan x="330" dy="20"></tspan><tspan x="330" dy="20">No IDs, offsets,</tspan><tspan x="330" dy="20">or spreadsheet rows</tspan></text>
<path d="M 450 220 L 490 220" fill="none" stroke="#8390a3" stroke-width="1.65" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
<rect x="490" y="100" width="240" height="240" rx="12" fill="#f3f7fd" stroke="#4f7fbf" stroke-width="1.35" filter="url(#softShadow)"/>
<circle cx="514" cy="129" r="12" fill="#ffffff" stroke="#4f7fbf" stroke-width="1.15"/>
<text x="514" y="134" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="700" fill="#4f7fbf"><tspan x="514" dy="0">2</tspan></text>
<text x="540" y="134" text-anchor="start" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e4677"><tspan x="540" dy="0">Layer 2: Python</tspan></text>
<text x="610" y="161" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="400" fill="#172033"><tspan x="610" dy="0">Binds every quote</tspan><tspan x="610" dy="20">byte-for-byte</tspan><tspan x="610" dy="20"></tspan><tspan x="610" dy="20">Builds canonical graph</tspan><tspan x="610" dy="20">validates hard rules</tspan><tspan x="610" dy="20"></tspan><tspan x="610" dy="20">Owns IDs, spans,</tspan><tspan x="610" dy="20">dispositions</tspan></text>
<path d="M 730 220 L 770 220" fill="none" stroke="#8390a3" stroke-width="1.65" stroke-linecap="round" marker-end="url(#arrowSlate)"/>
<rect x="770" y="100" width="240" height="240" rx="12" fill="#f1f8f4" stroke="#4f956f" stroke-width="1.35" filter="url(#softShadow)"/>
<circle cx="794" cy="129" r="12" fill="#ffffff" stroke="#4f956f" stroke-width="1.15"/>
<text x="794" y="134" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="700" fill="#4f956f"><tspan x="794" dy="0">3</tspan></text>
<text x="820" y="134" text-anchor="start" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="15" font-weight="700" fill="#22513a"><tspan x="820" dy="0">Layer 3: Review</tspan></text>
<text x="890" y="161" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="400" fill="#172033"><tspan x="890" dy="0">Flat CSV for scanning</tspan><tspan x="890" dy="20">JSONL for AI review</tspan><tspan x="890" dy="20">DuckDB for SQL</tspan><tspan x="890" dy="20"></tspan><tspan x="890" dy="20">Human adjudication</tspan><tspan x="890" dy="20">goes back to filing</tspan><tspan x="890" dy="20"></tspan><tspan x="890" dy="20">Workbook is calibration</tspan></text>
<text x="520" y="400" text-anchor="middle" font-family="'Source Sans 3', 'Inter', 'Avenir', system-ui, sans-serif" font-size="13" font-weight="600" fill="#172033"><tspan x="520" dy="0">Authority order: SEC filing &gt; canonical graph &gt; Alex CSV &gt; legacy workbook</tspan></text>
</svg>
